name: Deploy
on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-west-1

jobs:
  deploy-ios:
    name: Deploy iOS
    runs-on: macos-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true
      - name: Setup Skip
        uses: skiptools/actions/setup-skip@v1
      - name: Build & deploy to TestFlight
        working-directory: ./Darwin
        run: bundle exec fastlane beta
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}

  deploy-android:
    name: Deploy Android
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Skip
        uses: skiptools/actions/setup-skip@v1
        with:
          install-swift-android-sdk: true
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true
      - name: Retrieve secrets
        env:
          GOOGLE_PLAY_KEY_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_KEY_JSON_BASE64 }}
          ANDROID_SIGN_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGN_KEYSTORE_BASE64 }}
        run: |
          mkdir -p ./Android/fastlane/.secrets
          echo $GOOGLE_PLAY_KEY_JSON_BASE64 | base64 --decode > ./Android/fastlane/.secrets/googleplay.json
          echo $ANDROID_SIGN_KEYSTORE_BASE64 | base64 --decode > ./Android/fastlane/.secrets/keystore.jks
      - name: Build & deploy to Google Play
        working-directory: ./Android
        run: bundle exec fastlane release
        env:
          ANDROID_SIGN_KEYSTORE_FILE: ${{ github.workspace }}/Android/fastlane/.secrets/keystore.jks
          ANDROID_SIGN_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_SIGN_KEYSTORE_PASSWORD }}
          ANDROID_SIGN_KEY_ALIAS: ${{ secrets.ANDROID_SIGN_KEY_ALIAS }}
          ANDROID_SIGN_KEY_PASSWORD: ${{ secrets.ANDROID_SIGN_KEY_PASSWORD }}
          DISTRIBUTE_EXTERNAL_TESTERS: "true"

